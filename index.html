<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador EXANI II – Matemáticas</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f0f2f5;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
h1{text-align:center;color:#1a73e8}
.timer{text-align:center;font-size:22px;color:#d32f2f;font-weight:bold}
.options label{
  display:block;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  margin:10px 0;
  cursor:pointer;
}
.options label:hover{background:#f1f3f4}
.correct{background:#c8e6c9}
.incorrect{background:#ffcdd2}
.feedback{
  margin-top:15px;
  padding:10px;
  background:#eef;
  border-radius:8px;
}
.hidden{display:none}
.nav{display:flex;justify-content:space-between;margin-top:20px}
button{padding:12px 30px;font-size:16px;cursor:pointer}
input{width:100%;padding:12px;margin:10px 0}
</style>
</head>

<body>
<div class="container">

<h1>EXAMEN TIPO CENEVAL<br><small>Matemáticas – 48 preguntas</small></h1>
<div class="timer" id="timer">Tiempo restante: 180:00</div>

<!-- INICIO -->
<div id="startScreen">
  <input id="nombre" placeholder="Nombre completo">
  <input id="correo" placeholder="Correo electrónico">
  <button id="btnStart" style="width:100%;background:#1a73e8;color:white">
    INICIAR EXAMEN
  </button>
</div>

<!-- EXAMEN -->
<div id="examScreen" class="hidden">
  <div id="questionNumber"></div>
  <div id="questionText" style="margin:20px 0;font-weight:bold"></div>
  <div id="options" class="options"></div>
  <div id="feedback" class="feedback hidden"></div>

  <div class="nav">
    <button id="btnPrev">← Anterior</button>
    <button id="btnNext">Siguiente →</button>
  </div>

  <button id="btnFinish"
    style="width:100%;margin-top:20px;background:#d32f2f;color:white">
    FINALIZAR EXAMEN
  </button>
</div>

<!-- RESULTADOS -->
<div id="resultsScreen" class="hidden" style="text-align:center">
  <h2>Resultados</h2>
  <h1 id="score"></h1>
  <p id="percentage"></p>
</div>

</div>

<script>
/* ================= CONFIGURACIÓN ================= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYgvU5OcEEEoWpCtLIcWkeQF352K1deBgxNoqQO4SF6teh0uBymIdgQoC93UrIAtXa/exec";

/* ================= 48 PREGUNTAS ================= */

{q:"Simplifica: (5x²-3x+7)+(2x²+8x-4)-(x²-5x+9)",options:["6x²+10x-6","6x²+6x-6","7x²+10x-6","5x²+10x-6"],correct:0,feedback:"Se combinan términos semejantes correctamente."},
{q:"Factoriza: 49x²-64y²",options:["(7x-8y)(7x+8y)","(7x+8y)²","49(x-y)²","No se puede"],correct:0,feedback:"Es diferencia de cuadrados."},
{q:"Resuelve: 3x+6=21",options:["x=5","x=7","x=6","x=9"],correct:1,feedback:"3x=15 → x=7."},

{q:"(2³)² es igual a:",options:["2⁵","2⁶","2⁸","2⁹"],correct:1,feedback:"Potencia de potencia."},

{q:"Si 4x=32, x=",options:["4","6","8","10"],correct:2,feedback:"Divide entre 4."},
{q:"Simplifica: 3(2x-1)",options:["6x-1","6x-3","2x-3","6x+1"],correct:1,feedback:"Propiedad distributiva."},

{q:"Dominio de f(x)=1/(x-2)",options:["x≠2","Todos","x>2","x<2"],correct:0,feedback:"No se permite división entre cero."},
{q:"f(x)=3x-4, f(2)=",options:["2","6","4","10"],correct:0,feedback:"3(2)-4=2."},
{q:"La gráfica de y=x³ es:",options:["Recta","Parábola","Cúbica","Hipérbola"],correct:2,feedback:"Es una función cúbica."},

{q:"Si f(x)=x+1, f(x)=0 cuando x=",options:["-1","1","0","2"],correct:0,feedback:"x+1=0 → x=-1."},

{q:"Suma de ángulos internos de un cuadrilátero",options:["180°","270°","360°","450°"],correct:2,feedback:"(n-2)·180 con n=4."},
{q:"Perímetro de un rectángulo 8×5",options:["26","40","13","30"],correct:0,feedback:"P=2(l+a)."},
{q:"Área de un círculo de radio 4",options:["16π","8π","12π","4π"],correct:0,feedback:"A=πr²."},
{q:"Teorema que relaciona catetos e hipotenusa",options:["Pitágoras","Tales","Euclides","Gauss"],correct:0,feedback:"a²+b²=c²."},
{q:"Volumen de un prisma rectangular 2×3×5",options:["10","30","20","15"],correct:1,feedback:"V=l·a·h."},

  
{q:"Media de 4,6,10",options:["6","7","8","10"],correct:1,feedback:"(4+6+10)/3."},
{q:"Moda de 3,5,5,7",options:["3","5","7","No hay"],correct:1,feedback:"Es el valor más repetido."},
{q:"Probabilidad de obtener águila en una moneda",options:["1","1/2","1/3","0"],correct:1,feedback:"Dos resultados posibles."},
{q:"Rango del conjunto 2,9,4,7",options:["5","7","9","4"],correct:1,feedback:"Máximo - mínimo."},
{q:"Mediana de 2,4,6,8",options:["4","5","6","7"],correct:1,feedback:"Promedio de los dos centrales."},
  {
  q:"¿Cuál es la ecuación de la circunferencia con centro en (3,−2) y radio 5?",
  options:[
    "(x−3)²+(y+2)²=25",
    "(x+3)²+(y−2)²=25",
    "(x−3)²+(y−2)²=5",
    "x²+y²−3x+2y=25"
  ],
  correct:0,
  feedback:"La forma estándar es (x−h)²+(y−k)²=r²."
},
{
  q:"Dada la ecuación x²+y²−6x+4y−12=0, ¿cuál es el centro de la circunferencia?",
  options:[
    "(−3,2)",

  ],
  correct:1,

},
{
  q:"La ecuación (x+4)²+(y−5)²=36 tiene radio:",

  correct:1,
  feedback:"El radio es la raíz de 36."
},
{
  q:"El punto P(5,3) respecto a la circunferencia x²+y²−4x−6y−12=0 está:",
  options:[
    "Sobre la circunferencia",
    "Fuera de la circunferencia",

  ],
  correct:2,
  feedback:"La distancia del punto al centro es menor que el radio."

  q:"Las circunferencias C₁:(x−4)²+(y−1)²=25 y C₂:(x−2)²+(y+3)²=25 son:",
  options:[

    "Concéntricas",
    "Secantes",
    "Exteriores"
  ],
  correct:2,
  feedback:"La distancia entre centros es menor que la suma de los radios."

{
  q:"¿Cuál es la ecuación de la parábola con vértice en el origen que pasa por (4,8)?",
  options:[
    "y=2x²",
    "y=x²/2",
    "y=4x²",
    "y=x²"
  ],
  correct:1,
  feedback:"Sustituyendo el punto se obtiene a=1/2."
},
{
  q:"La ecuación y²=12x representa una parábola con foco en:",
  options:[
    "(3,0)",
    "(0,3)",

  correct:0,
  feedback:"En y²=4px se tiene p=3."

  q:"La parábola y=−(x−2)²−3 tiene vértice en:",

  correct:1,
  feedback:"Está en forma vértice y=a(x−h)²+k."

  q:"La parábola x²=16y tiene parámetro p igual a:",
  options:["2","4","8","16"],
  correct:1,
  feedback:"Comparando con x²=4py se obtiene p=4."

{

  options:[
    "4",

    "2",
    "−2"
  ],
  correct:1,
  feedback:"Para tangencia, el discriminante debe ser cero."
},
{
  q:"La ecuación x²+4y²−8x+16y−16=0 representa una:",
  options:[
    "Circunferencia",
    "Parábola",
    "Elipse",
    "Hipérbola"
  ],
  correct:2,
  feedback:"El discriminante es negativo y A≠C."
},
{
  q:"La ecuación 9x²+4y²−18x+16y−11=0 es una:",
  options:[
    "Circunferencia",
    "Elipse",
    "Hipérbola",
    "Parábola"
  ],
  correct:1,
  feedback:"Ambos términos cuadráticos tienen el mismo signo."
},
{
  q:"La ecuación 4x²−9y²+16x+18y−29=0 representa una:",
  options:[
    "Elipse",
    "Parábola",
    "Hipérbola",
    "Circunferencia"
  ],
  correct:2,
  feedback:"Los términos x² y y² tienen signos opuestos."
},
{
  q:"La ecuación (x−y−2)²=0 representa:",
  options:[
    "Una parábola",
    "Dos rectas secantes",
    "Una recta doble",
    "Una hipérbola"
  ],
  correct:2,
  feedback:"Es una cónica degenerada: recta doble."
},
{
  q:"Si B²−4AC=0, la cónica es:",
  options:[
    "Elipse",
    "Circunferencia",
    "Parábola",
    "Hipérbola"
  ],
  correct:2,
  feedback:"Condición característica de la parábola."
},
{
  q:"Determina el dominio de la función f(x) = √(4 − x²)",
  options:["x ≥ 0","−2 ≤ x ≤ 2","x ≤ −2","x ≥ 2"],
  correct:1,
  feedback:"Para que exista la raíz, 4 − x² ≥ 0 ⇒ −2 ≤ x ≤ 2."
},
{
  q:"Sean f(x)=2x+3 y g(x)=x²−1. ¿Cuál es (f+g)(x)?",
  options:["2x²+2x+2","x²+2x+2","x²+3x+2","2x²+3x+2"],
  correct:1,
  feedback:"(f+g)(x)=2x+3+x²−1=x²+2x+2."
},
{
  q:"La función f(x)=x⁴−3x²+5 es:",
  options:["Impar","Par","Ni par ni impar","Periódica"],
  correct:1,
  feedback:"Todos los exponentes son pares, por lo que f(−x)=f(x)."
},
{
  q:"La inversa de f(x)=5x−2 es:",
  options:["(x−2)/5","5x+2","(x+2)/5","1/(5x−2)"],
  correct:2,
  feedback:"Intercambiando x y y: x=5y−2 ⇒ y=(x+2)/5."
},
{
  q:"Si P(t)=500·2^(t/4), ¿cuántas bacterias hay después de 20 h?",
  options:["8 000","16 000","32 000","64 000"],
  correct:1,
  feedback:"P(20)=500·2⁵=500·32=16 000."
},
{
  q:"Usando definición, f(x)=x²+3x. ¿Cuánto vale f′(1)?",
  options:["3","4","5","6"],
  correct:2,
  feedback:"Por definición o regla: f′(x)=2x+3 ⇒ f′(1)=5."
},
{
  q:"La derivada de f(x)=5x⁴−3x²+7 es:",
  options:["20x³−6x","5x³−6x","20x³−3x","20x⁴−6x"],
  correct:0,
  feedback:"Derivando término a término: 20x³−6x."
},
{
  q:"La ecuación de la recta tangente a y=x³−6x+2 en x=1 es:",
  options:["y=−3x","y=3x","y=−3x+3","y=3x−3"],
  correct:0,
  feedback:"Pendiente f′(1)=−3 y pasa por (1,−3), queda y=−3x."
},
{
  q:"Si s(t)=t³−9t²+24t, ¿cuándo la velocidad es cero?",
  options:["t=1 y t=3","t=2 y t=4","t=0 y t=3","t=1 y t=4"],
  correct:1,
  feedback:"v(t)=3t²−18t+24=0 ⇒ (t−2)(t−4)=0."
},
{
  q:"La función f(x)=x²·sin(1/x) con f(0)=0 es:",
  options:["Discontinua","No derivable","Continua y derivable","Solo continua"],
  correct:2,
  feedback:"Por compresión, es continua y derivable en x=0."
},
  {
  q:"La integral ∫(5x⁴−3x²+7) dx es:",

  correct:0,
  feedback:"Se aplica la regla de potencia a cada término."
},
{
  q:"El valor de ∫₋₁² (3x²−4x+1) dx es:",
  options:["4","5","6","7"],
  correct:2,
  feedback:"Evaluando la primitiva F(x)=x³−2x²+x se obtiene 6."
},
{
  q:"Según el Teorema Fundamental, si F(x)=∫₁ˣ(t²+3t−2)dt entonces F′(x)=",

  correct:0,
  feedback:"La derivada de una integral definida es el integrando."
},
{
  q:"El área bajo la curva y=x² de 0 a 3 es:",

  correct:1,
  feedback:"∫₀³ x² dx = [x³/3]₀³ = 9."
},
{
  q:"La integral impropia ∫₁^∞ 1/x² dx:",

  correct:2,
  feedback:"∫₁^∞ x⁻² dx = 1, por lo que converge."
},

{q:"Sistema: x+y=10, x=4. y=",options:["4","6","10","14"],correct:1,feedback:"Sustitución directa."},
{q:"2x-4=0",options:["2","4","0","-2"],correct:0,feedback:"2x=4."},
{q:"Raíz de x²=0",options:["0","1","-1","2"],correct:0,feedback:"Raíz única."},
{q:"En y=mx+b, b representa:",options:["Pendiente","Corte en x","Corte en y","Origen"],correct:2,feedback:"Intersección con eje y."},
{q:"Resuelve: x+9=3",options:["6","-6","12","-12"],correct:1,feedback:"x=3-9."},

{q:"√100 =",options:["5","10","20","50"],correct:1,feedback:"10²=100."},
{q:"4! =",options:["24","12","16","8"],correct:0,feedback:"4·3·2·1."},
{q:"3²+4² =",options:["7","25","12","9"],correct:1,feedback:"9+16=25."},
{q:"x² siempre es:",options:["Negativo","Positivo","≥0","≤0"],correct:2,feedback:"Nunca es negativo."},
{q:"π es un número:",options:["Entero","Racional","Irracional","Natural"],correct:2,feedback:"Decimal infinito no periódico."}

/* ================= VARIABLES ================= */
const startScreen = document.getElementById("startScreen");
const examScreen = document.getElementById("examScreen");
const resultsScreen = document.getElementById("resultsScreen");
const questionNumber = document.getElementById("questionNumber");
const questionText = document.getElementById("questionText");
const optionsDiv = document.getElementById("options");
const feedbackDiv = document.getElementById("feedback");
const nombreInput = document.getElementById("nombre");
const correoInput = document.getElementById("correo");
const timerEl = document.getElementById("timer");
const scoreEl = document.getElementById("score");
const percentageEl = document.getElementById("percentage");

let current = 0;
let answers = new Array(questions.length).fill(null);
let time = 180 * 60;
let timerId;

/* ================= FUNCIONES ================= */
function startExam(){
  if(!nombreInput.value || !correoInput.value){
    alert("Ingresa nombre y correo");
    return;
  }
  startScreen.classList.add("hidden");
  examScreen.classList.remove("hidden");
  loadQuestion();
  timerId = setInterval(updateTimer,1000);
}

function updateTimer(){
  const m = Math.floor(time/60);
  const s = time%60;
  timerEl.textContent = `Tiempo restante: ${m}:${s<10?"0":""}${s}`;
  if(time--<=0) finishExam();
}

function loadQuestion(){
  const q = questions[current];
  questionNumber.textContent = `Pregunta ${current+1} de ${questions.length}`;
  questionText.textContent = q.q;
  optionsDiv.innerHTML = "";
  feedbackDiv.classList.add("hidden");

  q.options.forEach((op,i)=>{
    const label = document.createElement("label");
    label.textContent = `${String.fromCharCode(65+i)}) ${op}`;
    label.onclick = ()=>selectAnswer(i);
    optionsDiv.appendChild(label);
  });
}

function selectAnswer(i){
  answers[current] = i;
  optionsDiv.querySelectorAll("label").forEach((l,idx)=>{
    l.classList.remove("correct","incorrect");
    if(idx===questions[current].correct) l.classList.add("correct");
    if(idx===i && i!==questions[current].correct) l.classList.add("incorrect");
  });
  feedbackDiv.textContent = questions[current].feedback;
  feedbackDiv.classList.remove("hidden");
}

function nextQuestion(){
  if(current<questions.length-1){current++;loadQuestion();}
}
function prevQuestion(){
  if(current>0){current--;loadQuestion();}
}

function finishExam(){
  clearInterval(timerId);
  examScreen.classList.add("hidden");
  resultsScreen.classList.remove("hidden");

  const aciertos = answers.filter((a,i)=>a===questions[i].correct).length;
  const porcentaje = Math.round(aciertos/questions.length*100);

  scoreEl.textContent = `Puntaje: ${aciertos}/${questions.length}`;
  percentageEl.textContent = `Porcentaje: ${porcentaje}%`;

  fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      nombre:nombreInput.value,
      correo:correoInput.value,
      aciertos,
      porcentaje
    })
  });
}

/* ================= EVENTOS ================= */
document.getElementById("btnStart").onclick=startExam;
document.getElementById("btnNext").onclick=nextQuestion;
document.getElementById("btnPrev").onclick=prevQuestion;
document.getElementById("btnFinish").onclick=finishExam;
</script>

</body>
</html>
