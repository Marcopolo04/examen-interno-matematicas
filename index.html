<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador EXANI II – Matemáticas</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
h1{text-align:center;color:#1a73e8}
.timer{text-align:center;font-size:22px;color:#d32f2f;font-weight:bold}
.options label{
  display:block;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  margin:8px 0;
  cursor:pointer;
}
.options label:hover{background:#f1f3f4}
.correct{background:#c8e6c9}
.incorrect{background:#ffcdd2}
.feedback{
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  background:#eef;
}
.hidden{display:none}
.nav{display:flex;justify-content:space-between;margin-top:20px}
button{padding:10px 25px;font-size:16px;cursor:pointer}
input{width:100%;padding:10px;margin:10px 0}
</style>
</head>

<body>
<div class="container">

<h1>Simulador EXANI II – Matemáticas</h1>
<div class="timer" id="timer">Tiempo: 180:00</div>

<!-- PANTALLA INICIO -->
<div id="startScreen">
  <input id="nombre" placeholder="Nombre completo">
  <input id="correo" placeholder="Correo electrónico">
  <button onclick="startExam()" style="width:100%;background:#1a73e8;color:white">
    INICIAR EXAMEN
  </button>
</div>

<!-- EXAMEN -->
<div id="examScreen" class="hidden">
  <div id="questionNumber"></div>
  <div id="questionText" style="margin:15px 0;font-weight:bold"></div>
  <div id="options" class="options"></div>
  <div id="feedback" class="feedback hidden"></div>

  <div class="nav">
    <button onclick="prevQuestion()">← Anterior</button>
    <button onclick="nextQuestion()">Siguiente →</button>
  </div>

  <button onclick="finishExam()"
    style="width:100%;margin-top:20px;background:#d32f2f;color:white">
    FINALIZAR EXAMEN
  </button>
</div>

<!-- RESULTADOS -->
<div id="resultsScreen" class="hidden" style="text-align:center">
  <h2>Resultados</h2>
  <h1 id="score"></h1>
  <p id="percentage"></p>
</div>

</div>

<script>
/* ========= CONFIGURACIÓN ========= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDSCQ6QhAvoVs9w7D7JLG15W7njMEqd7DDq9sxtp6SZpu26EK69FARE7AMms5HJjpINQ/exec";

/* ========= PREGUNTAS (48) ========= */
const questions = [
  {q:"Simplifica: (3x²+5x-2)+(2x²-3x+4)",options:["5x²+2x+2","5x²+8x+2","x²+2x+2","5x²+2x-6"],correct:0,feedback:"Se suman términos semejantes."},
  {q:"Factoriza: x²-9",options:["(x-9)(x+1)","(x-3)(x+3)","(x-1)(x-9)","No se factoriza"],correct:1,feedback:"Diferencia de cuadrados."},
  {q:"Resuelve: 2x+5=15",options:["x=5","x=10","x=7.5","x=0"],correct:0,feedback:"2x=10 → x=5."},
  {q:"Pendiente de y=3x-4",options:["-4","3","1/3","4"],correct:1,feedback:"El coeficiente de x es la pendiente."},
  {q:"Área de un triángulo base 10 y altura 6",options:["30","60","16","20"],correct:0,feedback:"(b·h)/2."},
  {q:"(5²)³ =",options:["5⁵","5⁶","25³","125"],correct:1,feedback:"Potencia de potencia."},
  {q:"x/4=6",options:["10","24","2","6"],correct:1,feedback:"Multiplica por 4."},
  {q:"√144 =",options:["10","11","12","14"],correct:2,feedback:"12²=144."},
  {q:"3x=18",options:["5","6","9","3"],correct:1,feedback:"Divide entre 3."},
  {q:"2(x+3) =",options:["2x+3","x+6","2x+6","6x"],correct:2,feedback:"Propiedad distributiva."},

  {q:"Dominio de f(x)=1/x",options:["Todos","x≠0","x>0","x<0"],correct:1,feedback:"No existe división entre cero."},
  {q:"f(x)=2x+1, f(3)=",options:["6","7","8","5"],correct:1,feedback:"Sustituye x=3."},
  {q:"Gráfica de y=x²",options:["Recta","Parábola","Círculo","Hipérbola"],correct:1,feedback:"Función cuadrática."},
  {q:"x²=16",options:["4","-4","±4","0"],correct:2,feedback:"Dos soluciones."},
  {q:"f(x)=x-5, f(x)=0",options:["-5","5","0","1"],correct:1,feedback:"x=5."},

  {q:"Ángulos internos del triángulo",options:["90°","180°","270°","360°"],correct:1,feedback:"Suman 180°."},
  {q:"Perímetro cuadrado lado 4",options:["8","12","16","20"],correct:2,feedback:"4×lado."},
  {q:"Área círculo r=3",options:["9.42","18.84","28.26","6.28"],correct:2,feedback:"πr²."},
  {q:"Hipotenusa es el lado",options:["Menor","Mayor","Igual","Ninguno"],correct:1,feedback:"Opuesto al ángulo recto."},
  {q:"Volumen cubo lado 2",options:["4","6","8","12"],correct:2,feedback:"l³."},

  {q:"Media de 2,4,6",options:["4","6","3","5"],correct:0,feedback:"Promedio."},
  {q:"Moda de 1,2,2,3",options:["1","2","3","No hay"],correct:1,feedback:"Valor más frecuente."},
  {q:"Probabilidad cara",options:["1","1/2","1/3","0"],correct:1,feedback:"Dos resultados."},
  {q:"Rango 2,5,9",options:["7","5","9","3"],correct:0,feedback:"Máx-mín."},
  {q:"Mediana 3,7,9",options:["7","9","3","6"],correct:0,feedback:"Valor central."},

  {q:"x+y=5, x=2",options:["3","2","5","7"],correct:0,feedback:"Sustituye."},
  {q:"2x=10",options:["2","10","5","20"],correct:2,feedback:"Divide entre 2."},
  {q:"x²=0",options:["0","1","-1","2"],correct:0,feedback:"Raíz única."},
  {q:"En y=mx+b, b es",options:["Pendiente","Ordenada","Corte en y","Corte en x"],correct:2,feedback:"Intersección con eje y."},
  {q:"x-7=0",options:["7","-7","0","1"],correct:0,feedback:"x=7."},

  {q:"√81",options:["7","8","9","6"],correct:2,feedback:"9²=81."},
  {q:"5!",options:["120","60","24","5"],correct:0,feedback:"Factorial."},
  {q:"2³",options:["6","8","9","4"],correct:1,feedback:"2×2×2."},
  {q:"x²≥0",options:["x>0","x<0","Todo real","x≠0"],correct:2,feedback:"Nunca negativo."},
  {q:"π es",options:["Racional","Entero","Irracional","Natural"],correct:2,feedback:"Decimal infinito."}
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let time = 180 * 60;
let timer;

/* ========= FUNCIONES ========= */
function startExam(){
  if(!nombre.value || !correo.value){
    alert("Completa nombre y correo");
    return;
  }
  startScreen.classList.add("hidden");
  examScreen.classList.remove("hidden");
  loadQuestion();

  timer = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    timerEl.textContent = `Tiempo: ${m}:${s<10?"0":""}${s}`;
    if(time-- <= 0) finishExam();
  },1000);
}

const timerEl = document.getElementById("timer");

function loadQuestion(){
  questionNumber.textContent =
    `Pregunta ${current+1} de ${questions.length}`;
  questionText.textContent = questions[current].q;
  options.innerHTML = "";
  feedback.classList.add("hidden");

  questions[current].options.forEach((op,i)=>{
    const label = document.createElement("label");
    label.textContent = `${String.fromCharCode(65+i)}) ${op}`;
    label.onclick = ()=>answer(i);
    options.appendChild(label);
  });
}

function answer(i){
  answers[current] = i;
  document.querySelectorAll(".options label").forEach((l,idx)=>{
    l.classList.remove("correct","incorrect");
    if(idx === questions[current].correct) l.classList.add("correct");
    if(idx === i && i !== questions[current].correct) l.classList.add("incorrect");
  });
  feedback.textContent = questions[current].feedback;
  feedback.classList.remove("hidden");
}

function nextQuestion(){
  if(current < questions.length - 1){
    current++;
    loadQuestion();
  }
}

function prevQuestion(){
  if(current > 0){
    current--;
    loadQuestion();
  }
}

function finishExam(){
  const faltan = answers.filter(a=>a===null).length;
  if(faltan>0 && !confirm(`Faltan ${faltan} preguntas. ¿Finalizar?`)) return;

  clearInterval(timer);
  examScreen.classList.add("hidden");
  resultsScreen.classList.remove("hidden");

  let aciertos = answers.filter((a,i)=>a===questions[i].correct).length;
  score.textContent = `Puntaje: ${aciertos}/${questions.length}`;
  percentage.textContent = `${Math.round(aciertos/questions.length*100)}%`;

  fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      nombre:nombre.value,
      correo:correo.value,
      aciertos,
      porcentaje:Math.round(aciertos/questions.length*100)
    })
  });
}
</script>
</body>
</html>
