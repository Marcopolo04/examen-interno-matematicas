<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen Tipo CENEVAL - Matemáticas</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f0f2f5;
  padding: 20px;
}
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
h1 { text-align: center; color: #1a73e8; }
.timer { text-align: center; font-size: 24px; font-weight: bold; color: #d32f2f; }
.question { margin: 30px 0; }
.options label {
  display: block;
  margin: 12px 0;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
}
.options label:hover { background: #f1f3f4; }
button {
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
}
.nav { display: flex; justify-content: space-between; margin-top: 20px; }
.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
<h1>EXAMEN TIPO CENEVAL<br><small>Matemáticas</small></h1>
<div class="timer" id="timer"></div>

<div id="startScreen">
  <input id="nombre" placeholder="Nombre completo">
  <input id="matricula" placeholder="Correo">
  <button onclick="startExam()" style="width:100%;background:#1a73e8;color:white;">INICIAR EXAMEN</button>
</div>

<div id="examScreen" class="hidden">
  <div id="questionNumber"></div>
  <div id="questionText" class="question"></div>
  <div id="options" class="options"></div>

  <div class="nav">
    <button onclick="prevQuestion()">← Anterior</button>
    <button onclick="nextQuestion()">Siguiente →</button>
  </div>

  <button onclick="finishExam()" style="background:#d32f2f;color:white;width:100%;margin-top:20px;">
    FINALIZAR EXAMEN
  </button>
</div>

<div id="resultsScreen" class="hidden" style="text-align:center;">
  <h2>¡Examen terminado!</h2>
  <h1 id="score"></h1>
  <p id="percentage"></p>
  <button onclick="sendToSheets()" id="btnEnviar"
    style="background:#34a853;color:white;">ENVIAR RESULTADOS</button>
</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzj8XN-o_Vz3XTV99gShyyx4k6XO6KL15P2StEt0jPtI85uFXRE8IZsHg5NWza8Uh2JkQ/exec";

const questions = [
  {
    q:"Simplifica: (5x²-3x+7)+(2x²+8x-4)-(x²-5x+9)",
    options:["6x²+10x-6","6x²+6x-6","7x²+10x-6","5x²+10x-6"],
    correct:0
  },
  {
    q:"Factoriza: 49x²-64y²",
    options:["(7x-8y)(7x+8y)","(7x+8y)²","49x-64y","(7x-8y)²"],
    correct:0
  }
  // AGREGA AQUÍ LAS 48
];

let currentQuestion = 0;
let userAnswers = new Array(questions.length).fill(null);
let timeLeft = 180 * 60;
let timer;

function startExam(){
  if(!nombre.value || !matricula.value){
    alert("Completa tus datos");
    return;
  }
  startScreen.classList.add("hidden");
  examScreen.classList.remove("hidden");
  updateTimer();
  timer = setInterval(updateTimer,1000);
  loadQuestion();
}

function updateTimer(){
  let m = Math.floor(timeLeft/60);
  let s = timeLeft%60;
  timerEl.textContent = `Tiempo restante: ${m}:${s<10?"0":""}${s}`;
  if(timeLeft<=0){
    clearInterval(timer);
    finishExam();
  }
  timeLeft--;
}
const timerEl=document.getElementById("timer");

function loadQuestion(){
  questionNumber.textContent = `Pregunta ${currentQuestion+1} de ${questions.length}`;
  questionText.innerHTML = `<strong>${questions[currentQuestion].q}</strong>`;
  options.innerHTML = "";
  questions[currentQuestion].options.forEach((op,i)=>{
    options.innerHTML += `
    <label>
      <input type="radio" name="q" ${userAnswers[currentQuestion]===i?"checked":""}
      onclick="saveAnswer(${i})">
      ${String.fromCharCode(65+i)}) ${op}
    </label>`;
  });
}

function saveAnswer(i){ userAnswers[currentQuestion]=i; }

function nextQuestion(){
  if(currentQuestion<questions.length-1){
    currentQuestion++;
    loadQuestion();
  }
}
function prevQuestion(){
  if(currentQuestion>0){
    currentQuestion--;
    loadQuestion();
  }
}

function finishExam(){
  clearInterval(timer);
  examScreen.classList.add("hidden");
  resultsScreen.classList.remove("hidden");

  let aciertos=0;
  userAnswers.forEach((a,i)=>{ if(a===questions[i].correct) aciertos++; });

  score.textContent = `Puntaje: ${aciertos}/${questions.length}`;
  percentage.textContent = `Porcentaje: ${Math.round(aciertos/questions.length*100)}%`;

  window.examResults = {
    nombre:nombre.value,
    matricula:matricula.value,
    puntaje:aciertos,
    total:questions.length
  };
}

function sendToSheets(){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({data:JSON.stringify(window.examResults)})
  })
  .then(r=>r.text())
  .then(t=>alert("Resultados enviados ✅"))
  .catch(e=>alert("Error al enviar ❌"));
}
</script>

</body>
</html>
